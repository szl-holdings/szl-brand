<?xml version="1.0" encoding="UTF-8"?>
<!--
  KANCHAY / SZL Holdings — Logo Suite v1.0.0
  License: CC BY 4.0 (brand assets). Attribution: ORCID 0009-0001-0110-4173.
  Glyph: a stylized khipu knot (knotted-cord record) intertwined with a Greek lambda (Λ).
  Doctrine link: KHIPU = receipt DAG (SF-06); Λ-SPINE = aggregator backbone (SF-07).
  Single file: <symbol> defs + four lockups (primary, monochrome, favicon, horizontal).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="KANCHAY logo suite for SZL Holdings">
  <title>KANCHAY logo suite</title>
  <defs>
    <!-- canonical brand colors -->
    <linearGradient id="yuyayGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5cc4bf"/>
      <stop offset="1" stop-color="#168f89"/>
    </linearGradient>
    <linearGradient id="hatunGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e4cf99"/>
      <stop offset="1" stop-color="#c08f2f"/>
    </linearGradient>

    <!-- ===== PRIMARY GLYPH: lambda spine + khipu knot ===== -->
    <!-- A lambda (Λ) whose right leg is a hanging khipu cord with three knots.
         The two legs read as Λ; the knots read as a 3-pendant khipu (sum-of-sums). -->
    <symbol id="kanchay-glyph" viewBox="0 0 200 200">
      <!-- lambda left leg (apex to lower-left) -->
      <path d="M100 28 L40 172" fill="none" stroke="url(#hatunGrad)" stroke-width="20"
            stroke-linecap="round"/>
      <!-- lambda right leg = khipu primary cord (apex to lower-right) -->
      <path d="M100 28 L160 172" fill="none" stroke="url(#yuyayGold)" stroke-width="20"
            stroke-linecap="round"/>
      <!-- khipu knots: three pendant knots on the right cord -->
      <g fill="#c0392b">
        <circle cx="124" cy="86" r="11"/>
        <circle cx="139" cy="122" r="11"/>
        <circle cx="154" cy="160" r="11"/>
      </g>
      <!-- knot highlight rings (the "intertwine" — cord wraps the lambda apex) -->
      <circle cx="100" cy="36" r="14" fill="none" stroke="#f5f7fa" stroke-width="5"/>
    </symbol>

    <!-- monochrome variant (single ink, no gradients) -->
    <symbol id="kanchay-glyph-mono" viewBox="0 0 200 200">
      <path d="M100 28 L40 172" fill="none" stroke="currentColor" stroke-width="20" stroke-linecap="round"/>
      <path d="M100 28 L160 172" fill="none" stroke="currentColor" stroke-width="20" stroke-linecap="round"/>
      <g fill="currentColor">
        <circle cx="124" cy="86" r="11"/><circle cx="139" cy="122" r="11"/><circle cx="154" cy="160" r="11"/>
      </g>
      <circle cx="100" cy="36" r="14" fill="none" stroke="currentColor" stroke-width="5"/>
    </symbol>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="720" fill="#0a0f1e"/>

  <!-- ===== 1. PRIMARY (stacked) ===== -->
  <g transform="translate(80,60)">
    <text x="0" y="-10" font-family="monospace" font-size="20" fill="#76859b" letter-spacing="3">01 · PRIMARY</text>
    <use href="#kanchay-glyph" width="200" height="200" x="40" y="10"/>
    <text x="140" y="250" text-anchor="middle" font-family="'Inter',sans-serif" font-size="44"
          font-weight="700" fill="#f5f7fa" letter-spacing="6">KANCHAY</text>
    <text x="140" y="282" text-anchor="middle" font-family="monospace" font-size="15"
          fill="#76859b" letter-spacing="2">SZL HOLDINGS · BRAND ORGAN</text>
  </g>

  <!-- ===== 2. MONOCHROME (on dark) ===== -->
  <g transform="translate(460,60)" color="#f5f7fa">
    <text x="0" y="-10" font-family="monospace" font-size="20" fill="#76859b" letter-spacing="3">02 · MONOCHROME</text>
    <use href="#kanchay-glyph-mono" width="200" height="200" x="40" y="10"/>
    <text x="140" y="250" text-anchor="middle" font-family="'Inter',sans-serif" font-size="44"
          font-weight="700" fill="#f5f7fa" letter-spacing="6">KANCHAY</text>
  </g>

  <!-- ===== 3. FAVICON (square, rounded) ===== -->
  <g transform="translate(840,60)">
    <text x="0" y="-10" font-family="monospace" font-size="20" fill="#76859b" letter-spacing="3">03 · FAVICON</text>
    <rect x="40" y="10" width="200" height="200" rx="44" fill="#10151c" stroke="#3c4757" stroke-width="3"/>
    <use href="#kanchay-glyph" width="150" height="150" x="65" y="35"/>
  </g>

  <!-- ===== 4. HORIZONTAL LOCKUP ===== -->
  <g transform="translate(80,400)">
    <text x="0" y="-10" font-family="monospace" font-size="20" fill="#76859b" letter-spacing="3">04 · HORIZONTAL LOCKUP</text>
    <use href="#kanchay-glyph" width="150" height="150" x="0" y="20"/>
    <text x="180" y="115" font-family="'Inter',sans-serif" font-size="58" font-weight="700"
          fill="#f5f7fa" letter-spacing="4">KANCHAY</text>
    <line x1="182" y1="135" x2="640" y2="135" stroke="#3c4757" stroke-width="2"/>
    <text x="182" y="168" font-family="monospace" font-size="18" fill="#a4b1c4" letter-spacing="2">
      sovereign AI · provable provenance</text>
  </g>

  <!-- favicon mini reference at 32px scale to show legibility -->
  <g transform="translate(840,400)">
    <text x="0" y="-10" font-family="monospace" font-size="20" fill="#76859b" letter-spacing="3">FAVICON @ 32 / 16 px</text>
    <rect x="0" y="20" width="64" height="64" rx="14" fill="#10151c"/>
    <use href="#kanchay-glyph" width="48" height="48" x="8" y="28"/>
    <rect x="90" y="36" width="32" height="32" rx="7" fill="#10151c"/>
    <use href="#kanchay-glyph" width="24" height="24" x="94" y="40"/>
    <rect x="150" y="44" width="16" height="16" rx="4" fill="#10151c"/>
    <use href="#kanchay-glyph" width="12" height="12" x="152" y="46"/>
  </g>
</svg>
